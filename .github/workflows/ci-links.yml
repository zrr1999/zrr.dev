name: "CI - Link Checks"

on:
  push:
    branches:
      - main
    paths:
      - "AGENTS.md"
      - "README.md"
      - ".github/workflows/ci-links.yml"
  pull_request:
    branches:
      - main
    paths:
      - "AGENTS.md"
      - "README.md"
      - ".github/workflows/ci-links.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  links:
    name: links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check links with lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --exclude-loopback
            --no-progress
            'README.md'
            'AGENTS.md'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
