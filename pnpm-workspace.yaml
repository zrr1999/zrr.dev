packages:
  - "apps/*"
allowBuilds:
  esbuild: true
  sharp: true

catalog:
  vite: "npm:@voidzero-dev/vite-plus-core@0.1.21"
  vite-plus: "0.1.21"
  vitest: "npm:@voidzero-dev/vite-plus-test@0.1.21"

overrides:
  "@astrojs/internal-helpers": "0.9.0"
  # Align with AGENTS.md: newer Astro / vite-plus stacks hit vite-plus-core
  # "Not implemented" in generateBundle until upstream fixes land.
  astro: "6.3.1"
  vite: "catalog:"
  vite-plus: "catalog:"
  vitest: "catalog:"

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    typescript: "*"
    vite: "*"
    vitest: "*"
