packages:
  - "apps/*"
allowBuilds:
  esbuild: true
  sharp: true
  workerd: true

catalog:
  astro: "^6.3.1"
  vite: "npm:@voidzero-dev/vite-plus-core@0.1.24"
  vite-plus: "0.1.24"
  vitest: "npm:@voidzero-dev/vite-plus-test@0.1.24"

overrides:
  "@astrojs/internal-helpers": "0.10.0"
  # Keep direct and transitive Astro resolutions on the workspace catalog entry.
  astro: "catalog:"
  vite: "catalog:"
  vite-plus: "catalog:"
  vitest: "catalog:"

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    typescript: "*"
    vite: "*"
    vitest: "*"
