packages:
  - "apps/*"
allowBuilds:
  esbuild: true
  sharp: true
  workerd: true

catalog:
  astro: "^7.0.2"
  vite: "npm:@voidzero-dev/vite-plus-core@0.2.1"
  vite-plus: "0.2.1"
  vitest: "npm:@voidzero-dev/vite-plus-test@0.1.24"

overrides:
  # Keep direct and transitive Astro resolutions on the workspace catalog entry.
  astro: "catalog:"
  # Patch transitive audit findings while waiting for upstream packages to refresh locks/ranges.
  glob: "11.1.0"
  # hast-util-to-estree expects a callable default export that style-to-js 1.0.0 lacks.
  style-to-js: "1.1.21"
  yaml: "2.9.0"
  vite: "catalog:"
  vite-plus: "catalog:"
  vitest: "catalog:"

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    typescript: "*"
    vite: "*"
    vitest: "*"
