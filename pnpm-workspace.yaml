packages:
  - "apps/*"
allowBuilds:
  esbuild: true
  sharp: true
  workerd: true

catalog:
  vite: "npm:@voidzero-dev/vite-plus-core@0.1.24"
  vite-plus: "0.1.24"
  vitest: "npm:@voidzero-dev/vite-plus-test@0.1.24"

overrides:
  "@astrojs/internal-helpers": "0.10.0"
  # Align with AGENTS.md: keep Astro and Vite+ moving together; older
  # combinations can hit vite-plus-core "Not implemented" in generateBundle.
  astro: "6.3.1"
  vite: "catalog:"
  vite-plus: "catalog:"
  vitest: "catalog:"

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    typescript: "*"
    vite: "*"
    vitest: "*"
